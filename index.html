<!DOCTYPE html>
<html lang="en" style="color-scheme: light; background: #ffffff;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#ffffff" />
    <title>VowFinds</title>
    <style>
      /* Hard override — prevents Samsung Internet + Chrome Android dark mode */
      :root { color-scheme: light only !important; }
      html  { color-scheme: light only !important; background: #ffffff !important; forced-color-adjust: none !important; }
      body  { color-scheme: light only !important; background: #faf6f1 !important; color: #2c2c2c !important; forced-color-adjust: none !important; }
      *     { forced-color-adjust: none; }
      @media (prefers-color-scheme: dark) {
        html, body { background: #ffffff !important; color: #2c2c2c !important; color-scheme: light only !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
